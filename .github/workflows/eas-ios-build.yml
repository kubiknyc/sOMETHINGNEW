name: iOS build (EAS)

# Manually triggered from the GitHub website (Actions tab → "Run workflow").
# Builds the iOS app in the cloud via EAS — no local machine required.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS profile (preview = direct-install / internal, production = TestFlight & App Store)"
        type: choice
        options:
          - production
          - preview
        default: production
      submit:
        description: "Submit to TestFlight after building (production only)"
        type: boolean
        default: true

jobs:
  ios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive --wait

      - name: Submit to TestFlight
        if: ${{ inputs.submit && inputs.profile == 'production' }}
        run: eas submit --platform ios --profile production --latest --non-interactive
