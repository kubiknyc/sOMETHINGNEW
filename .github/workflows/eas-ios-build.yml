name: iOS build (EAS)

# Manually triggered from the GitHub website (Actions tab → "Run workflow").
# Builds the iOS app in the cloud via EAS — no local machine required.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS profile (preview = direct-install / internal, production = TestFlight & App Store)"
        type: choice
        options:
          - production
          - preview
        default: production
      submit:
        description: "Submit to TestFlight after building (production only)"
        type: boolean
        default: true

jobs:
  ios:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs for supply-chain safety; the trailing
      # comment notes the tag. Bump deliberately when upgrading.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: 20.3.0
          token: ${{ secrets.EXPO_TOKEN }}

      # Creates/links the EAS project (writes the project id) so the build can
      # run non-interactively. Idempotent once the project exists.
      - name: Configure EAS project
        run: eas init --non-interactive --force

      # Write the App Store Connect API key (secret) to a file so EAS can use it
      # to generate signing credentials and submit, with no interactive prompts.
      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/asc-api-key.p8"
          chmod 600 "$RUNNER_TEMP/asc-api-key.p8"

      - name: Build iOS
        env:
          EXPO_ASC_API_KEY_PATH: ${{ runner.temp }}/asc-api-key.p8
          EXPO_ASC_KEY_ID: Y4X9CMHABN
          EXPO_ASC_ISSUER_ID: 36cf25d9-1ee0-4c93-af03-1916223fa9a4
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive --wait

      - name: Submit to TestFlight
        if: ${{ inputs.submit && inputs.profile == 'production' }}
        env:
          EXPO_ASC_API_KEY_PATH: ${{ runner.temp }}/asc-api-key.p8
          EXPO_ASC_KEY_ID: Y4X9CMHABN
          EXPO_ASC_ISSUER_ID: 36cf25d9-1ee0-4c93-af03-1916223fa9a4
        run: eas submit --platform ios --profile production --latest --non-interactive
